<!doctype html>
<html>
  <head>
    <title>Day 21 Todo App</title>
  </head>
  <body>
    <h1>Todo App</h1>

    <form id="todoForm">
      <input id="todoInput" type="text" placeholder="Enter todo" />

      <button type="submit">Add Todo</button>
    </form>

    <br />

    <button id="clearBtn" type="button">Clear All Todos</button>

    <p id="message"></p>

    <h2>Todos</h2>

    <ul id="todoList"></ul>

    <script src="app.js"></script>
  </body>
</html>
