<!DOCTYPE html>
<html>
<head>
    <title>Day 20 Product Inventory</title>
</head>
<body>
    <h1>Product Inventory</h1>

    <form id="productForm">
        <input id="nameInput" type="text" placeholder="Product name">
        <br><br>

        <input id="quantityInput" type="number" placeholder="Quantity">
        <br><br>

        <input id="priceInput" type="number" placeholder="Price">
        <br><br>

        <button type="submit">Add Product</button>
    </form>

    <br>

    <button id="clearBtn" type="button">Clear All Products</button>

    <p id="message"></p>

    <h2>Products</h2>
    <ul id="productList"></ul>

    <h2 id="totalOutput">Total Stock Value: 0</h2>

    <script src="app.js"></script>
</body>
</html>
